# AppointmentSaaS uygulama veritabanı — yalnızca localhost (5432 dışarıya açılmaz)
# Kurulum: cp .env.example .env → şifreleri doldur → docker compose up -d

services:
  postgres:
    container_name: appointmentsaas_postgres
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - appointmentsaas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  appointmentsaas_postgres_data:
